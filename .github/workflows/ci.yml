name: .NET CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore oop-s2-1-mvc-76239.sln

      - name: Build solution
        run: dotnet build oop-s2-1-mvc-76239.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test oop-s2-1-mvc-76239.sln --no-build --configuration Release --verbosity normal